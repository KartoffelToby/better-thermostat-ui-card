name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Build
      - uses: oven-sh/setup-bun@v2
        with:
          # Keep in sync with packageManager in package.json — the lockfile
          # was written by this version and CI installs with --frozen-lockfile.
          bun-version: 1.3.14
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
      - name: Build the file
        run: bun run build
      # Upload build file to the release as an asset.
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v1-release

        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: /home/runner/work/better-thermostat-ui-card/better-thermostat-ui-card/dist/better-thermostat-ui-card.js
          asset_name: better-thermostat-ui-card.js
          tag: ${{ github.ref }}
          overwrite: true
      - name: HACS Action
        uses: "hacs/action@main"
        with:
          category: "plugin"
